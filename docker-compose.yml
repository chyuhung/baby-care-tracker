version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: baby-care-tracker
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # 持久化 SQLite 数据文件
      - ./data:/app/data
    environment:
      - PORT=8080
      - DATA_DIR=/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  default:
    name: baby-care-network
